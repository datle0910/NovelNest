server:
  port: 8082

spring:
  application:
    name: story-service

  datasource:
    url: jdbc:mysql://localhost:3306/story_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: story_user
    password: story_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# JWT Configuration - same secret as auth-service
app:
  jwt:
    secret: NovelNestSecretKeyForJWTTokenGenerationAndValidation2024VeryLongSecretKey

logging:
  level:
    com.example.storyservice: DEBUG

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}
