server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: story-service-ws
          uri: lb:ws://story-service
          predicates:
            - Path=/ws/**

        - id: story-service
          uri: lb://story-service
          predicates:
            - Path=/api/stories/**,/api/categories/**,/api/authors/**,/api/admin/stories/**,/api/admin/chapters/**,/api/admin/categories/**,/api/admin/authors/**,/api/admin/import/**,/api/admin/reports/**,/api/favorites/**,/api/reading-history/**,/api/comments/**,/api/chapters/**

        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/api/media/**,/media/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
