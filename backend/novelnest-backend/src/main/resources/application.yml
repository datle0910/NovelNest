server:
  port: 8080

spring:
  application:
    name: novelnest-backend

  datasource:
    url: jdbc:mysql://localhost:3306/novelnest_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: story_user
    password: story_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  # Mail (optional - OTP fallback to logs if not configured)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
app:
  jwt:
    secret: NovelNestSecretKeyForJWTTokenGenerationAndValidation2024VeryLongSecretKey
    expiration-ms: 86400000  # 24 hours
  upload:
    dir: uploads

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

huggingface:
  api:
    key: ${HUGGINGFACE_API_KEY:}

logging:
  level:
    com.example.novelnest: DEBUG
